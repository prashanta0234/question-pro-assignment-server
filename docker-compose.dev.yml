services:
  postgres:
    image: postgres:15-alpine
    container_name: grocery_postgres_dev
    environment:
      POSTGRES_USER: grocery_user
      POSTGRES_PASSWORD: grocery_pass
      POSTGRES_DB: grocery_booking
    ports:
      - '5432:5432'
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U grocery_user -d grocery_booking']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - grocery-dev-net

  redis:
    image: redis:7-alpine
    container_name: grocery_redis_dev
    command: redis-server --save 60 1 --loglevel warning
    ports:
      - '6379:6379'
    volumes:
      - redis_dev_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - grocery-dev-net

volumes:
  postgres_dev_data:
    driver: local
  redis_dev_data:
    driver: local

networks:
  grocery-dev-net:
    driver: bridge
